<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Page Not Found | Honeydew</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 500px;
    }
    .icon {
      font-size: 80px;
      margin-bottom: 20px;
    }
    h1 {
      color: #92400e;
      font-size: 2.5rem;
      margin-bottom: 16px;
    }
    p {
      color: #78350f;
      font-size: 1.125rem;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .links {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    a {
      display: inline-block;
      padding: 12px 24px;
      background: #f59e0b;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s;
    }
    a:hover {
      background: #d97706;
    }
    a.secondary {
      background: transparent;
      color: #92400e;
      border: 2px solid #f59e0b;
    }
    a.secondary:hover {
      background: #fef3c7;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🍯</div>
    <h1>Page Not Found</h1>
    <p>Sorry, the page you're looking for doesn't exist or has been moved. Let's get you back on track!</p>
    <div class="links">
      <a href="/">Go Home</a>
      <a href="/blog" class="secondary">Browse Blog</a>
    </div>
  </div>
</body>
</html>
